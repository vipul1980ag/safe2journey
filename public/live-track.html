<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Location — Safe2Journey</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F7FA; }
  #header {
    background: #1565C0; color: #fff; padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #header h1 { font-size: 16px; font-weight: 700; }
  #header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  #map { width: 100%; height: calc(100vh - 110px); }
  #info-bar {
    background: #fff; padding: 10px 18px;
    display: flex; align-items: center; gap: 16px;
    border-top: 1px solid #E0E0E0; font-size: 13px; flex-wrap: wrap;
  }
  .info-chip {
    display: flex; align-items: center; gap: 5px;
    background: #F0F4FF; border-radius: 20px; padding: 5px 12px;
  }
  .info-chip .val { font-weight: 700; color: #1565C0; }
  #stale { color: #888; }
  #stale.fresh { color: #2E7D32; }
  #stale.old   { color: #E65100; }
  #expired { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.6); z-index:999; align-items:center; justify-content:center; }
  #expired.show { display:flex; }
  #expired-box { background:#fff; border-radius:16px; padding:32px; text-align:center; max-width:300px; }
  #expired-box h2 { margin-bottom:12px; color:#333; }
  #expired-box p  { color:#777; font-size:14px; line-height:1.5; }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1 id="route-label">Loading live location…</h1>
    <div class="sub" id="dest-label"></div>
  </div>
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Safe_journey_icon.svg/32px-Safe_journey_icon.svg.png"
       onerror="this.style.display='none'" />
</div>

<div id="map"></div>

<div id="info-bar">
  <div class="info-chip">Speed <span class="val" id="speed-val">—</span> km/h</div>
  <div class="info-chip">Current leg <span class="val" id="leg-val">—</span></div>
  <div id="stale">Waiting for data…</div>
</div>

<div id="expired">
  <div id="expired-box">
    <h2>Session Ended</h2>
    <p>This live tracking link has expired or the traveller has stopped sharing their location.</p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const params = new URLSearchParams(location.search);
const token  = params.get('token');
if (!token) {
  document.getElementById('route-label').textContent = 'No tracking token in URL.';
}

const map = L.map('map').setView([20, 0], 3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

// Live position marker (pulsing blue dot)
const liveIcon = L.divIcon({
  className: '',
  html: `<div style="width:18px;height:18px;background:#1565C0;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(21,101,192,0.35),0 2px 6px rgba(0,0,0,0.3)"></div>`,
  iconSize: [18, 18], iconAnchor: [9, 9],
});
const destIcon = L.divIcon({
  className: '',
  html: `<div style="font-size:26px;line-height:1">🏁</div>`,
  iconSize: [26, 26], iconAnchor: [13, 26],
});

let liveMarker = null;
let destMarker = null;
let firstLoad = true;
let failCount = 0;

const MODE_ICONS = { bus:'🚌', metro:'🚇', tram:'🚋', walking:'🚶', taxi:'🚕', auto:'🛺', car_bike:'🚗', train:'🚆', ferry:'⛴', air:'✈' };

async function poll() {
  try {
    const res = await fetch(`/api/track/${token}`);
    if (res.status === 404) {
      if (failCount++ > 3) {
        document.getElementById('expired').classList.add('show');
        return;
      }
    }
    if (!res.ok) return;
    failCount = 0;
    const d = await res.json();

    // Update marker
    const latlng = [d.lat, d.lng];
    if (!liveMarker) {
      liveMarker = L.marker(latlng, { icon: liveIcon }).addTo(map);
    } else {
      liveMarker.setLatLng(latlng);
    }

    // Destination marker (set once)
    if (!destMarker && d.destination) {
      destMarker = L.marker(latlng, { icon: destIcon })
        .addTo(map)
        .bindPopup(`<b>Destination</b><br>${d.destination}`);
    }

    if (firstLoad) {
      map.setView(latlng, 15);
      firstLoad = false;
    } else {
      map.panTo(latlng, { animate: true, duration: 0.8 });
    }

    // Update UI
    document.getElementById('route-label').textContent = d.routeLabel || 'Live Journey';
    document.getElementById('dest-label').textContent   = d.destination ? `To: ${d.destination}` : '';
    document.getElementById('speed-val').textContent    = d.speedKmh > 0 ? Math.round(d.speedKmh) : '—';

    const modeIcon = MODE_ICONS[d.legMode] || '';
    document.getElementById('leg-val').textContent = d.legMode ? `${modeIcon} → ${d.legTo || ''}` : '—';

    const staleEl = document.getElementById('stale');
    if (d.staleSecs < 60) {
      staleEl.textContent = d.staleSecs < 5 ? 'Live' : `Updated ${d.staleSecs}s ago`;
      staleEl.className   = d.staleSecs < 30 ? 'fresh' : '';
    } else {
      const mins = Math.round(d.staleSecs / 60);
      staleEl.textContent = `Last seen ${mins} min ago`;
      staleEl.className   = 'old';
    }
  } catch { /* network error — try again */ }
}

if (token) {
  poll();
  setInterval(poll, 5000);
}
</script>
</body>
</html>
